<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CC Look - Floating</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: transparent;
      overflow: hidden;
      user-select: none;
    }

    .container {
      width: 100%;
      height: 100vh;
      background: rgba(30, 30, 30, 0.5);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: opacity 0.5s ease-out;
      cursor: grab;
    }

    .container.fading {
      opacity: 0;
    }

    .container.dragging {
      cursor: grabbing;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      font-size: 13px;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.9);
      word-wrap: break-word;
      white-space: pre-wrap;
      pointer-events: none;
    }

    .content::-webkit-scrollbar {
      width: 4px;
    }

    .content::-webkit-scrollbar-track {
      background: transparent;
    }

    .content::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
    }

    .content::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .thinking {
      color: rgba(255, 200, 100, 0.9);
      font-style: italic;
    }

    .tool-use {
      color: rgba(100, 200, 255, 0.9);
      background: rgba(100, 200, 255, 0.1);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
      display: inline-block;
      margin: 2px 0;
    }

    .server-tool-use {
      color: rgba(200, 150, 255, 0.9);
      background: rgba(200, 150, 255, 0.1);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
      display: inline-block;
      margin: 2px 0;
    }

    .content.tool-mode {
      display: flex;
      flex-direction: column;
      padding: 0;
    }

    .tool-detail-card {
      background: rgba(20, 20, 20, 0.6);
      border-radius: 8px;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      flex: 1;
      display: flex;
      flex-direction: column;
      margin: 10px;
      overflow: hidden;
    }

    .tool-name {
      font-size: 13px;
      font-weight: 600;
      color: rgba(100, 200, 255, 0.95);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .tool-input {
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 11px;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.85);
      background: rgba(0, 0, 0, 0.25);
      padding: 8px;
      border-radius: 6px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0;
      flex: 1;
    }

    .token-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
      background: rgba(0, 0, 0, 0.25);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      pointer-events: none;
    }

    .token-bar span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .token-bar .token-number {
      font-weight: 600;
      color: rgba(255, 255, 255, 0.95);
    }
  </style>
</head>
<body>
  <div class="container" id="container">
    <div class="content" id="content"></div>
    <div class="token-bar" id="token-bar">
      <span>in: <span class="token-number" id="token-in">-</span></span>
      <span>out: <span class="token-number" id="token-out">0</span></span>
    </div>
  </div>

  <script>
    const contentEl = document.getElementById('content')
    const containerEl = document.getElementById('container')
    const tokenInEl = document.getElementById('token-in')
    const tokenOutEl = document.getElementById('token-out')

    // 拖拽状态
    let isDragging = false
    let startX = 0
    let startY = 0

    // 鼠标按下
    document.addEventListener('mousedown', (e) => {
      isDragging = true
      startX = e.screenX
      startY = e.screenY
      containerEl.classList.add('dragging')
      window.floatingApi.dragStart()
    })

    // 鼠标移动
    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return
      const dx = e.screenX - startX
      const dy = e.screenY - startY
      window.floatingApi.drag(dx, dy)
    })

    // 鼠标释放
    document.addEventListener('mouseup', (e) => {
      if (!isDragging) return
      isDragging = false
      containerEl.classList.remove('dragging')
      const dx = e.screenX - startX
      const dy = e.screenY - startY
      window.floatingApi.dragEnd(dx, dy)
    })

    // 格式化工具调用显示
    function formatToolUse(type, content) {
      try {
        const data = JSON.parse(content)
        const name = data.name || 'unknown'
        let input = ''
        if (data.input) {
          input = JSON.stringify(data.input, null, 2)
        } else if (data.function?.arguments) {
          input = JSON.stringify(data.function.arguments, null, 2)
        }
        return { name, input }
      } catch {
        return { name: 'unknown', input: content }
      }
    }

    // 接收内容
    window.floatingApi.onContent((data) => {
      const { content, type } = data

      if (type === 'start') {
        return
      }

      if (type === 'end') {
        return
      }

      if (type === 'thinking') {
        const span = document.createElement('span')
        span.className = 'thinking'
        span.textContent = content
        contentEl.appendChild(span)
      } else if (type === 'tool_use' || type === 'server_tool_use') {
        const { name, input } = formatToolUse(type, content)
        const div = document.createElement('div')
        div.className = type === 'tool_use' ? 'tool-use' : 'server-tool-use'
        div.innerHTML = `<strong>🔧 ${name}</strong><br><code style="font-size: 11px; opacity: 0.8;">${escapeHtml(input.substring(0, 200))}${input.length > 200 ? '...' : ''}</code>`
        contentEl.appendChild(div)
      } else if (type === 'tool_detail') {
        // 右侧工具详情浮窗：整页替换展示
        contentEl.classList.add('tool-mode')
        const tokenBar = document.getElementById('token-bar')
        if (tokenBar) tokenBar.style.display = 'none'
        try {
          const toolData = JSON.parse(content)
          let inputDisplay = ''
          if (typeof toolData.input === 'string') {
            // 可能是未完成的 JSON 字符串，尝试格式化
            try {
              inputDisplay = JSON.stringify(JSON.parse(toolData.input), null, 2)
            } catch {
              inputDisplay = toolData.input
            }
          } else {
            inputDisplay = JSON.stringify(toolData.input, null, 2)
          }
          contentEl.innerHTML = `
            <div class="tool-detail-card">
              <div class="tool-name">🔧 ${escapeHtml(toolData.name || 'unknown')}</div>
              <pre class="tool-input">${escapeHtml(inputDisplay)}</pre>
            </div>
          `
        } catch {
          contentEl.innerHTML = `<div class="tool-detail-card"><pre class="tool-input">${escapeHtml(content)}</pre></div>`
        }
      } else {
        const span = document.createElement('span')
        span.textContent = content
        contentEl.appendChild(span)
      }

      contentEl.scrollTop = contentEl.scrollHeight
    })

    // Token 统计
    window.floatingApi.onTokens((data) => {
      tokenInEl.textContent = data.input != null ? data.input : '-'
      tokenOutEl.textContent = String(data.output)
    })

    // 渐变消失
    window.floatingApi.onFadeout(() => {
      containerEl.classList.add('fading')
    })

    function escapeHtml(text) {
      const div = document.createElement('div')
      div.textContent = text
      return div.innerHTML
    }
  </script>
</body>
</html>
